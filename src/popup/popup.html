<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlazCaptcha</title>

</head>
<body>
  <div class="container">
    <h1 data-i18n="extName"></h1>

    <div class="section">
      <label class="toggle">
        <input type="checkbox" id="autoDetect" checked>
        <span class="slider"></span>
        <span class="label" data-i18n="autoDetect"></span>
      </label>
    </div>

    <div class="section">
      <h2 data-i18n="manualRecognition"></h2>
      <div id="dropZone" class="drop-zone">
        <p data-i18n="dropZoneHint"></p>
        <input type="file" id="fileInput" accept="image/*" hidden>
      </div>
      <div id="manualResult" class="result" hidden>
        <span class="result-label" data-i18n="resultLabel"></span>
        <span id="resultText" class="result-text"></span>
        <button id="copyBtn" class="copy-btn" data-i18n-title="copyTitle">📋</button>
      </div>
    </div>

    <div class="section">
      <h2 data-i18n="recentHistory"></h2>
      <ul id="historyList" class="history-list">
        <li class="empty" data-i18n="noRecords"></li>
      </ul>
    </div>
  </div>
</body>
</html>
