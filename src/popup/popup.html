<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAPTCHA Solver</title>

</head>
<body>
  <div class="container">
    <h1>CAPTCHA Solver</h1>

    <div class="section">
      <label class="toggle">
        <input type="checkbox" id="autoDetect" checked>
        <span class="slider"></span>
        <span class="label">Auto Detect</span>
      </label>
    </div>

    <div class="section">
      <h2>Manual Recognition</h2>
      <div id="dropZone" class="drop-zone">
        <p>Drag & drop or paste an image</p>
        <input type="file" id="fileInput" accept="image/*" hidden>
      </div>
      <div id="manualResult" class="result" hidden>
        <span class="result-label">Result:</span>
        <span id="resultText" class="result-text"></span>
        <button id="copyBtn" class="copy-btn" title="Copy">📋</button>
      </div>
    </div>

    <div class="section">
      <h2>Recent History</h2>
      <ul id="historyList" class="history-list">
        <li class="empty">No records yet</li>
      </ul>
    </div>
  </div>
</body>
</html>
